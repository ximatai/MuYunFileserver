mfs:
  storage:
    type: local
    root-dir: ${user.dir}/build/test-storage
    temp-dir: ${user.dir}/build/test-tmp
  database:
    path: ${user.dir}/build/test-runtime-temp.db
  upload:
    max-file-size-bytes: 1048576
    min-free-space-bytes: 1
  cleanup:
    deleted-sweep-interval: 24H
  token:
    enabled: true
    algorithm: hmac-sha256
    secret: test-token-secret
    allowed-clock-skew: 1S
  preview:
    enabled: true
    office-enabled: true
    libreoffice:
      command: ${user.dir}/src/test/resources/bin/fake-soffice.sh
      timeout: 5S
      max-concurrency: 1
      retry-failure-after: 5M
      profile-root: ${user.dir}/build/test-libreoffice-profile
    cache:
      cleanup-orphan-preview-on-file-delete: true
  viewer:
    text:
      max-inline-bytes: 64

quarkus:
  datasource:
    devservices:
      enabled: false
  http:
    limits:
      max-body-size: 20M
