mfs:
  storage:
    type: local
    root-dir: ${user.dir}/build/test-storage
    temp-dir: ${user.dir}/build/test-tmp
  database:
    path: ${user.dir}/build/test-runtime-temp.db
  upload:
    max-file-size-bytes: 1048576
    min-free-space-bytes: 1
  cleanup:
    deleted-sweep-interval: 24H
  token:
    enabled: true
    algorithm: hmac-sha256
    secret: test-token-secret
    allowed-clock-skew: 1S
  preview:
    enabled: true
    office-enabled: true
    allowed-mime-types:
      - application/pdf
      - application/msword
      - application/vnd.ms-excel
      - application/vnd.ms-powerpoint
      - application/vnd.oasis.opendocument.text
      - application/vnd.oasis.opendocument.spreadsheet
      - application/vnd.oasis.opendocument.presentation
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
    libreoffice:
      command: ${user.dir}/src/test/resources/bin/fake-soffice.sh
      timeout: 5S
      max-concurrency: 1
      retry-failure-after: 5M
      profile-root: ${user.dir}/build/test-libreoffice-profile
    cache:
      cleanup-orphan-preview-on-file-delete: true

quarkus:
  datasource:
    devservices:
      enabled: false
  http:
    limits:
      max-body-size: 20M
