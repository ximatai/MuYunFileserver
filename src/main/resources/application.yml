quarkus:
  http:
    port: 8080
    cors:
      enabled: true
      origins: "*"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: accept,authorization,content-type,x-requested-with,x-tenant-id,x-user-id
      exposed-headers: content-disposition,content-length,content-type
  datasource:
    db-kind: sqlite
    jdbc:
      url: jdbc:sqlite:${mfs.database.path}
      max-size: 8
  flyway:
    migrate-at-start: true
    locations: db/migration

mfs:
  storage:
    type: local
    root-dir: ${user.dir}/var/storage
    temp-dir: ${user.dir}/var/tmp
    minio:
      auto-create-bucket: true
  upload:
    max-file-size-bytes: 524288000
    max-file-count: 10
    min-free-space-bytes: 1073741824
  database:
    path: ${user.dir}/var/data/muyun-fileserver.db
  cleanup:
    temporary-retention: 24H
    deleted-retention: 7D
    deleted-sweep-interval: 1H
    batch-size: 100
  security:
    allowed-mime-types:
      # Documents
      - application/pdf
      - text/plain
      - text/csv
      - text/markdown
      - text/xml
      - application/json
      - application/xml
      - application/rtf
      - application/msword
      - application/vnd.ms-excel
      - application/vnd.ms-powerpoint
      - application/vnd.oasis.opendocument.text
      - application/vnd.oasis.opendocument.spreadsheet
      - application/vnd.oasis.opendocument.presentation
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      # Images
      - image/bmp
      - image/gif
      - image/heic
      - image/heif
      - image/jpeg
      - image/png
      - image/tiff
      - image/webp
      # Audio and video
      - audio/aac
      - audio/mpeg
      - audio/mp4
      - audio/ogg
      - audio/vnd.wave
      - audio/wav
      - audio/wave
      - audio/webm
      - audio/x-wav
      - video/mp4
      - video/ogg
      - video/quicktime
      - video/webm
      - video/x-msvideo
      # Common archives
      - application/gzip
      - application/x-7z-compressed
      - application/x-bzip2
      - application/x-rar-compressed
      - application/x-tar
      - application/zip
  token:
    enabled: false
    algorithm: hmac-sha256
    allowed-clock-skew: 5S
  preview:
    enabled: true
    office-enabled: true
    allowed-mime-types:
      - application/pdf
      - application/msword
      - application/vnd.ms-excel
      - application/vnd.ms-powerpoint
      - application/vnd.oasis.opendocument.text
      - application/vnd.oasis.opendocument.spreadsheet
      - application/vnd.oasis.opendocument.presentation
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
    converter: libreoffice
    libreoffice:
      command: soffice
      timeout: 60S
      max-concurrency: 1
      retry-failure-after: 5M
      profile-root: ${user.dir}/var/tmp/libreoffice-profile
    cache:
      cleanup-orphan-preview-on-file-delete: true
  viewer:
    text:
      max-inline-bytes: 1048576
