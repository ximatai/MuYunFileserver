quarkus.http.port=8080
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:${mfs.database.path}
quarkus.datasource.jdbc.max-size=8
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

mfs.storage.type=local
mfs.storage.root-dir=${user.dir}/var/storage
mfs.storage.temp-dir=${user.dir}/var/tmp
mfs.storage.minio.auto-create-bucket=true
mfs.upload.max-file-size-bytes=524288000
mfs.upload.max-file-count=10
mfs.upload.min-free-space-bytes=1073741824
mfs.database.path=${user.dir}/var/data/muyun-fileserver.db
mfs.cleanup.deleted-retention=7D
mfs.cleanup.deleted-sweep-interval=1H
mfs.cleanup.batch-size=100
mfs.security.allowed-mime-types=application/pdf,image/png,image/jpeg,text/plain
